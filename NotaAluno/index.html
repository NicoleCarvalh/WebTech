<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nota Aluno</title>
  <link rel="stylesheet" href="./css/index.css">
  <script type="text/javascript" src="./js/index.js" defer></script>
</head>
<body>
  <main class="container">
    <form action="">
      <article class="form-control">
        <label for="nome">Digite o nome do aluno</label>
        <input type="text" id="nome"/>
        <label for="nota">Digite nota do aluno</label>
        <input type="number" min="0" max="10" id="nota"/>
      </article>
     

      <button  onclick="resultadoNotaClick(event)" id="verifica-nota">Verificar nota</button>

      <div id="resultado"></div>
    </form>
  </main>
  
</body>
</html>
